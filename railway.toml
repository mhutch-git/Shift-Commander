[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@10 && pnpm install --frozen-lockfile && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/shift-scheduler run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push-force && node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
